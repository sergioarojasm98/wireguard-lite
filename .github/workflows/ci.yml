name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'LICENSE']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Info.plist
        run: plutil -lint Resources/Info.plist

      - name: Check Swift compilation warnings
        run: |
          swiftc -swift-version 5 -framework Cocoa \
            -Xfrontend -warn-long-expression-type-checking=200 \
            -target arm64-apple-macosx12.0 \
            Sources/WireGuardLite.swift \
            -o /dev/null 2>&1 | tee warnings.log
          if grep -q "warning:" warnings.log; then
            echo "::warning::Swift compilation produced warnings"
          fi

  build:
    name: Build (Universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: make

      - name: Verify universal binary
        run: |
          file build/WireGuardLite.app/Contents/MacOS/WireGuardLite
          lipo -info build/WireGuardLite.app/Contents/MacOS/WireGuardLite

      - name: Verify code signature
        run: codesign --verify --verbose build/WireGuardLite.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WireGuardLite.app
          path: build/WireGuardLite.app
          retention-days: 30
